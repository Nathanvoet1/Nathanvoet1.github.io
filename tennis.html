<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Tennis - Balles qui tombent</title>
<style>
  /* Conteneur des balles */
  .balles-tennis {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    overflow: hidden;
    z-index: 1000;
  }

  /* Style balle avec image */
  .balle-tennis {
    position: absolute;
    width: 40px; height: 40px;
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/41/Tennis_ball_3D.png');
    background-size: cover;
    background-repeat: no-repeat;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
    pointer-events: none;
  }

  /* Animation chute avec rotation et translation horizontale */
  @keyframes tomber-balle {
    0% {
      transform: translateY(-50px) translateX(0) rotate(0deg);
      opacity: 1;
    }
    80% {
      transform: translateY(calc(100vh - 50px)) translateX(var(--offset-x)) rotate(576deg);
      opacity: 1;
    }
    90% {
      transform: translateY(calc(100vh - 70px)) translateX(var(--offset-x)) rotate(648deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) translateX(var(--offset-x)) rotate(720deg);
      opacity: 0;
    }
  }

  /* Impact lumineux */
  .impact {
    position: absolute;
    width: 30px; height: 30px;
    border-radius: 50%;
    box-shadow:
      0 0 8px 4px #c4ff00,
      0 0 20px 10px #aaff00aa;
    animation: impact-fade 0.5s ease forwards;
    pointer-events: none;
  }

  @keyframes impact-fade {
    0% {
      opacity: 1;
      transform: scale(0.6);
    }
    100% {
      opacity: 0;
      transform: scale(1.5);
    }
  }
</style>
</head>
<body>

<div class="balles-tennis"></div>

<script>
  const ballesContainer = document.querySelector('.balles-tennis');

  function creerBalle() {
    const balle = document.createElement('div');
    balle.classList.add('balle-tennis');

 
    const posX = Math.random() * (window.innerWidth - 40);
    balle.style.left = posX + 'px';


    const offsetX = (Math.random() * 200 - 100) + 'px';
    balle.style.setProperty('--offset-x', offsetX);

    const duree = 3 + Math.random() * 2;
    balle.style.animation = `tomber-balle ${duree}s linear forwards`;

    ballesContainer.appendChild(balle);

    setTimeout(() => {
      const y = window.innerHeight - 40;
      creerImpact(posX, y);
    }, duree * 0.8 * 1000);


    balle.addEventListener('animationend', () => balle.remove());
  }

  function creerImpact(x, y) {
    const impact = document.createElement('div');
    impact.classList.add('impact');

    impact.style.left = (x + 5) + 'px';
    impact.style.top = (y - 5) + 'px';

    ballesContainer.appendChild(impact);

    setTimeout(() => impact.remove(), 500);
  }

  setInterval(creerBalle, 2000 + Math.random() * 2000);
</script>

</body>
